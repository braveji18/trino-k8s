# Trino Rego м •мұ… вҖ” OPAлЎң л§ҲмҡҙнҠё
# ліҖкІҪ мӢң ConfigMap мһ¬м Ғмҡ© нӣ„ OPA Pod мһ¬мӢңмһ‘ лҳҗлҠ” reload API нҳём¶ң.
#
# мЈјмқҳ: Trino 480 OAuth2 лӘЁл“ҲмқҖ JWTмқҳ groups нҒҙл Ҳмһ„мқ„ identity.groupsлЎң мһҗлҸҷ
# м¶”м¶ңн•ҳм§Җ лӘ»н•Ё (groups-field лҜём§Җмӣҗ, file/ldap group provider л§ҲмҡҙнҠёлҠ” chartмқҳ
# /etc/trino л””л үн„°лҰ¬ л§ҲмҡҙнҠёмҷҖ м¶©лҸҢ). л”°лқјм„ң usernameвҶ’groups л§Өн•‘мқ„ ліё м •мұ…м—җ
# м •м ҒмңјлЎң л‘ . мӢ к·ң мӮ¬мҡ©мһҗ м¶”к°Җ мӢң user_to_groups мҷҖ Keycloak л‘ҳ лӢӨ к°ұмӢ .
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-opa-policy
  labels:
    app: opa
data:
  trino.rego: |
    package trino

    import rego.v1

    # кё°ліёмқҖ кұ°л¶Җ
    default allow := false

    # в”Җв”Җв”Җ username вҶ’ groups м •м Ғ л§Өн•‘ в”Җв”Җв”Җ
    # Keycloak мӮ¬мҡ©мһҗ/к·ёлЈ№кіј мқјм№ҳн•ҙм•ј н•Ё (scripts/setup-keycloak-realm.sh м°ёкі ).
    user_to_groups := {
        "admin_trino":    {"trino-admin"},
        "etl_user1":      {"trino-etl"},
        "etl_user2":      {"trino-etl"},
        "etl_user3":      {"trino-etl"},
        "etl_user4":      {"trino-etl"},
        "etl_user5":      {"trino-etl"},
        "analyst_user1":  {"trino-analyst"},
        "analyst_user2":  {"trino-analyst"},
        "analyst_user3":  {"trino-analyst"},
        "analyst_user4":  {"trino-analyst"},
        "analyst_user5":  {"trino-analyst"},
        "bi_superset":    {"trino-bi"},
        "bi_redash":      {"trino-bi"},
    }

    # мӮ¬мҡ©мһҗ к·ёлЈ№ вҖ” мҡ°м„  input.context.identity.groups (Trinoк°Җ мұ„мӣҢмЈјл©ҙ), м—Ҷмңјл©ҙ
    # username вҶ’ м •м Ғ л§Өн•‘мңјлЎң fallback.
    user_groups := groups if {
        input_groups := {g | some g in input.context.identity.groups}
        count(input_groups) > 0
        groups := input_groups
    } else := groups if {
        groups := user_to_groups[input.context.identity.user]
    } else := set()

    # в”Җв”Җв”Җ к·ёлЈ№ м •мқҳ в”Җв”Җв”Җ
    admin_groups := {"trino-admin"}
    etl_groups := {"trino-etl"}
    readonly_groups := {"trino-analyst", "trino-bi"}

    # в”Җв”Җв”Җ н—¬нҚј в”Җв”Җв”Җ
    is_admin if {
        some g in admin_groups
        g in user_groups
    }
    is_etl if {
        some g in etl_groups
        g in user_groups
    }
    is_readonly if {
        some g in readonly_groups
        g in user_groups
    }

    # в”Җв”Җв”Җ лӘЁл“  лЎңк·ёмқё мӮ¬мҡ©мһҗм—җкІҢ кё°ліё н—Ҳмҡ©лҗҳлҠ” мһ‘м—… в”Җв”Җв”Җ
    base_allowed_ops := {
        "ExecuteQuery",
        "AccessCatalog",
        "ShowCatalogs", "FilterCatalogs",
        "ShowSchemas", "FilterSchemas",
        "ShowTables", "FilterTables",
        "ShowColumns", "FilterColumns",
        "ShowFunctions",
        "ReadSystemInformation"
    }

    allow if {
        input.action.operation in base_allowed_ops
        count(user_groups) > 0
    }

    # в”Җв”Җв”Җ м •мұ… 1: adminмқҖ лӘЁл“  мһ‘м—… н—Ҳмҡ© в”Җв”Җв”Җ
    allow if is_admin

    # в”Җв”Җв”Җ м •мұ… 2: etlмқҖ hive/iceberg/postgresqlм—җ лҢҖн•ң лӘЁл“  мһ‘м—… в”Җв”Җв”Җ
    etl_catalogs := {"hive", "iceberg", "postgresql", "system", "tpch", "tpcds", "jmx", "memory"}

    allow if {
        is_etl
        input.action.resource.table.catalogName in etl_catalogs
    }
    allow if {
        is_etl
        input.action.resource.schema.catalogName in etl_catalogs
    }
    allow if {
        is_etl
        input.action.resource.catalog.name in etl_catalogs
    }
    allow if {
        is_etl
        not input.action.resource.table
        not input.action.resource.schema
        not input.action.resource.catalog
    }

    # в”Җв”Җв”Җ м •мұ… 3: analyst/biлҠ” read-only в”Җв”Җв”Җ
    read_only_ops := {
        "SelectFromColumns",
        "ShowSchemas", "ShowTables", "ShowColumns", "ShowCatalogs",
        "ShowCreateTable", "ShowCreateSchema",
        "FilterCatalogs", "FilterSchemas", "FilterTables", "FilterColumns",
        "ExecuteQuery", "AccessCatalog", "ReadSystemInformation",
        "ShowFunctions", "ExecuteFunction"
    }

    allow if {
        is_readonly
        input.action.operation in read_only_ops
    }

    # в”Җв”Җв”Җ м •мұ… 4: лӘЁл“  мӮ¬мҡ©мһҗлҠ” мһҗкё° мһҗмӢ мқ„ impersonate к°ҖлҠҘ в”Җв”Җв”Җ
    allow if {
        input.action.operation == "ImpersonateUser"
        input.action.resource.user.user == input.context.identity.user
    }

    # в”Җв”Җв”Җ м •мұ… 5: лҜјк°җ schema м°ЁлӢЁ (analyst/bi) в”Җв”Җв”Җ
    allow := false if {
        is_readonly
        input.action.resource.table.catalogName == "postgresql"
        input.action.resource.table.schemaName in {"internal", "hr_payroll"}
    }

    # в”Җв”Җв”Җ м •мұ… 6: queryId мһҗкё° мҝјлҰ¬ кҙҖлҰ¬ в”Җв”Җв”Җ
    allow if {
        input.action.operation in {"ViewQueryOwnedBy", "KillQueryOwnedBy"}
        input.action.resource.user.user == input.context.identity.user
    }
