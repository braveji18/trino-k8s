# Trino 480 - HTTPS only (Ingress termination)
# 공식 chart: https://trinodb.github.io/charts/  (chart name: trino)
#
# 설치:
#   helm repo add trino https://trinodb.github.io/charts
#   helm repo update
#   helm upgrade --install trino trino/trino -n trino -f helm/values.yaml

image:
  # 기본 공식 이미지:
  #   repository: trinodb/trino
  #   tag: "480"
  # JMX Exporter javaagent가 포함된 커스텀 이미지 (docker/trino-with-jmx/Dockerfile)
  repository: harbor.quantumcns.ai/akashiq/trino
  tag: "480-jmx"
  pullPolicy: IfNotPresent

# Harbor private project용 credential
# 사전 요구: `kubectl -n <ns> create secret docker-registry harbor-akashiq ...`
imagePullSecrets:
  - name: harbor-akashiq

server:
  workers: 3
  node:
    environment: production
    dataDir: /data/trino
  log:
    trino:
      level: INFO
  additionalLogProperties:
    io.trino.server.security.oauth2: DEBUG
  config:
    # HTTPS는 외부 LB에서 termination → qks-ingress → Trino(HTTP)
    # Coordinator 자체는 HTTP로 두고 internal communication shared secret 사용.
    https:
      enabled: false
    # 3단계: Keycloak OAuth2/OIDC 인증
    authenticationType: "OAUTH2"
    # 프록시 뒤에 있으므로 X-Forwarded-* 헤더 허용.
    # 이게 없으면 nginx-ingress의 X-Forwarded-For로 인해 Trino가 406 반환.
    http:
      processForwarded: true
  exchangeManager:
    name: "filesystem"
    baseDir: "/data/trino/exchange"
  # 3단계: OAuth2 세부 설정 — coordinator 전용 (worker에 들어가면 startup 실패)
  #
  # issuer 전략 (G21):
  #   KC_HOSTNAME=https://braveji-keycloak.trino.quantumcns.ai 설정으로 Keycloak이
  #   내부/외부 어디서든 동일한 외부 issuer를 반환.
  #   OIDC discovery 비활성화 — *.quantumcns.ai 와일드카드 인증서가
  #   sub-sub-domain(*.trino.quantumcns.ai)과 매치되지 않아 Java TLS hostname
  #   검증 실패. discovery를 끄고 모든 endpoint를 수동 지정.
  #   auth-url만 외부 HTTPS (브라우저 리다이렉트용), 나머지는 내부 HTTP (서버간 통신).
  coordinatorExtraConfig: |
    http-server.authentication.oauth2.issuer=https://braveji-keycloak.trino.quantumcns.ai/realms/trino
    http-server.authentication.oauth2.oidc.discovery=false
    http-server.authentication.oauth2.client-id=trino
    http-server.authentication.oauth2.client-secret=${ENV:OAUTH2_CLIENT_SECRET}
    http-server.authentication.oauth2.scopes=openid,profile
    http-server.authentication.oauth2.principal-field=preferred_username
    http-server.authentication.oauth2.auth-url=https://braveji-keycloak.trino.quantumcns.ai/realms/trino/protocol/openid-connect/auth
    http-server.authentication.oauth2.token-url=http://keycloak:8080/realms/trino/protocol/openid-connect/token
    http-server.authentication.oauth2.jwks-url=http://keycloak:8080/realms/trino/protocol/openid-connect/certs
    http-server.authentication.oauth2.userinfo-url=http://keycloak:8080/realms/trino/protocol/openid-connect/userinfo
    web-ui.enabled=true
    web-ui.authentication.type=OAUTH2
    http-server.authentication.allow-insecure-over-http=true

# chart가 위 server.config.http.processForwarded 키를 무시하는 경우의 안전장치
# (두 방식 중 어느 하나라도 config.properties에 들어가면 됨)
additionalConfigProperties:
  - http-server.process-forwarded=true
  # 인증 활성화 시 coordinator↔worker 간 내부 통신에 shared secret 필수
  - internal-communication.shared-secret=+i5HUMAr++000b1RJWQTO1oFr64XGJk8PIfO7Th7IXQ=
  # chart가 coordinator.config.query.maxMemory를 무시하므로 여기서 강제 주입
  - query.max-memory=88GB
  # tune-5: spill 활성화
  - spill-enabled=true
  - spiller-spill-path=/data/trino/spill
  - spiller-max-used-space-threshold=0.8
  - max-spill-per-node=100GB
  - query-max-spill-per-node=50GB

# 3단계: OAuth2 client secret 환경변수 주입 (coordinator + worker 모두에 적용)
envFrom:
  - secretRef:
      name: trino-oauth2

# 3단계: Resource Groups — 팀/사용자별 리소스 격리 (§2)
# chart가 resource-groups.properties + resource-groups.json을 자동 생성하고
# coordinator에만 마운트. 별도 ConfigMap/Volume 설정 불필요.
resourceGroups:
  type: configmap
  resourceGroupsConfig: |-
    {
      "cpuQuotaPeriod": "1h",
      "rootGroups": [
        {
          "name": "root",
          "softMemoryLimit": "100%",
          "hardConcurrencyLimit": 60,
          "maxQueued": 150,
          "schedulingPolicy": "weighted",
          "subGroups": [
            {
              "name": "etl",
              "softMemoryLimit": "60%",
              "hardConcurrencyLimit": 5,
              "maxQueued": 20,
              "schedulingWeight": 3,
              "softCpuLimit": "20m",
              "hardCpuLimit": "30m",
              "jmxExport": true
            },
            {
              "name": "interactive",
              "softMemoryLimit": "35%",
              "hardConcurrencyLimit": 40,
              "maxQueued": 100,
              "schedulingPolicy": "weighted",
              "schedulingWeight": 5,
              "jmxExport": true,
              "subGroups": [
                {
                  "name": "analyst",
                  "softMemoryLimit": "50%",
                  "hardConcurrencyLimit": 15,
                  "maxQueued": 30,
                  "schedulingWeight": 2,
                  "jmxExport": true
                },
                {
                  "name": "bi",
                  "softMemoryLimit": "60%",
                  "hardConcurrencyLimit": 20,
                  "maxQueued": 50,
                  "schedulingWeight": 5,
                  "jmxExport": true
                }
              ]
            },
            {
              "name": "admin",
              "softMemoryLimit": "20%",
              "hardConcurrencyLimit": 10,
              "maxQueued": 20,
              "schedulingWeight": 4,
              "jmxExport": true
            },
            {
              "name": "default",
              "softMemoryLimit": "5%",
              "hardConcurrencyLimit": 2,
              "maxQueued": 5,
              "schedulingWeight": 1,
              "jmxExport": true
            }
          ]
        }
      ],
      "selectors": [
        { "group": "root.admin", "user": "admin.*" },
        { "group": "root.etl", "user": "etl_.*" },
        { "group": "root.interactive.bi", "user": "bi_.*" },
        { "group": "root.interactive.analyst", "user": "analyst.*" },
        { "group": "root.default" }
      ]
    }

# 3단계 §4-d: OPA 접근제어 (Ranger에서 전환)
# Rego 정책은 ConfigMap(trino-opa-policy) → opa Deployment에 마운트.
# Trino는 HTTP로 opa:8181에 매 인가 요청 전송. DB/ConfigMap 마운트 불필요.
# 이전 Ranger 설정은 git log 참고.
accessControl:
  type: properties
  properties: |
    access-control.name=opa
    opa.policy.uri=http://opa:8181/v1/data/trino/allow
    opa.log-requests=true
    opa.log-responses=true

commonLabels: {}

coordinator:
  # Istio sidecar 비활성화 (데이터 인프라 일괄 정책)
  # + Prometheus scrape annotation (prom-prometheus-server의 kubernetes-pods-slow job이 자동 수집)
  annotations:
    sidecar.istio.io/inject: "false"
    prometheus.io/scrape: "true"
    prometheus.io/port: "5556"
    prometheus.io/path: "/metrics"
  additionalVolumes:
    - name: jmx-exporter-config
      configMap:
        name: trino-jmx-exporter-config
    - name: data-trino
      emptyDir:
        sizeLimit: 20Gi
  additionalVolumeMounts:
    - name: jmx-exporter-config
      mountPath: /etc/jmx-exporter
    - name: data-trino
      mountPath: /data/trino
  jvm:
    maxHeapSize: "8G"
    gcMethod:
      type: "UseG1GC"
      g1:
        heapRegionSize: "32M"
  additionalJVMConfig:
    - "-javaagent:/opt/jmx-exporter/jmx_prometheus_javaagent.jar=5556:/etc/jmx-exporter/config.yaml"
    # tune-4: JVM 안정성 + 진단 플래그
    - "-XX:+UseContainerSupport"
    - "-XX:+ExplicitGCInvokesConcurrent"
    - "-XX:+ExitOnOutOfMemoryError"
    - "-XX:+HeapDumpOnOutOfMemoryError"
    - "-XX:HeapDumpPath=/tmp/heapdump"
    - "-XX:ErrorFile=/tmp/hs_err_%p.log"
    - "-XX:ReservedCodeCacheSize=512M"
    - "-Djdk.attach.allowAttachSelf=true"
    - "-Dfile.encoding=UTF-8"
    # GC 로깅 (튜닝 중 임시)
    - "-Xlog:gc*:file=/tmp/gc.log:time,uptime,level,tags:filecount=5,filesize=100M"
  config:
    memory:
      heapHeadroomPerNode: "2GB"
    query:
      maxMemory: "88GB"
      maxMemoryPerNode: "4GB"
  resources:
    requests:
      cpu: "2"
      memory: "10Gi"
    limits:
      cpu: "4"
      memory: "12Gi"

worker:
  annotations:
    sidecar.istio.io/inject: "false"
    prometheus.io/scrape: "true"
    prometheus.io/port: "5556"
    prometheus.io/path: "/metrics"
  additionalVolumes:
    - name: jmx-exporter-config
      configMap:
        name: trino-jmx-exporter-config
    - name: data-trino
      emptyDir:
        sizeLimit: 30Gi
  additionalVolumeMounts:
    - name: jmx-exporter-config
      mountPath: /etc/jmx-exporter
    - name: data-trino
      mountPath: /data/trino
  # tune-2 Step 1: qcs05/06에 배치 (128C/258Gi, taint 없음)
  # qcs01-03은 control-plane NoSchedule taint로 사용 불가
  # anti-affinity는 preferred — 작은 워커(4C/20Gi)이므로 동일 노드 다수 배치 허용
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values: [qcs05, qcs06]
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values: [worker]
            topologyKey: kubernetes.io/hostname
  jvm:
    maxHeapSize: "16G"
    gcMethod:
      type: "UseG1GC"
      g1:
        heapRegionSize: "16M"
  additionalJVMConfig:
    - "-javaagent:/opt/jmx-exporter/jmx_prometheus_javaagent.jar=5556:/etc/jmx-exporter/config.yaml"
    # tune-4: JVM 안정성 + 진단 플래그
    - "-XX:+UseContainerSupport"
    - "-XX:+ExplicitGCInvokesConcurrent"
    - "-XX:+ExitOnOutOfMemoryError"
    - "-XX:+HeapDumpOnOutOfMemoryError"
    - "-XX:HeapDumpPath=/tmp/heapdump"
    - "-XX:ErrorFile=/tmp/hs_err_%p.log"
    - "-XX:ReservedCodeCacheSize=512M"
    - "-Djdk.attach.allowAttachSelf=true"
    - "-Dfile.encoding=UTF-8"
    # GC 로깅 (튜닝 중 임시)
    - "-Xlog:gc*:file=/tmp/gc.log:time,uptime,level,tags:filecount=5,filesize=100M"
  config:
    memory:
      heapHeadroomPerNode: "4GB"
    query:
      maxMemoryPerNode: "10GB"
  resources:
    requests:
      cpu: "4"
      memory: "18Gi"      # 4개 × 18Gi = 72Gi → qcs05 빈 메모리 73Gi에 fit
    limits:
      cpu: "4"
      memory: "20Gi"      # heap 16G + JVM overhead 2~4G headroom

# Catalogs (catalogs/ 디렉토리 내용을 그대로 옮겨 넣음)
catalogs:
  tpch: |
    connector.name=tpch
    tpch.splits-per-node=8
  # JMX: JVM/GC/connector 메트릭을 SQL로 조회 (2단계 튜닝 측정용)
  jmx: |
    connector.name=jmx
  # Memory: 세션 내 임시 테이블 (디버깅/실험용)
  memory: |
    connector.name=memory
  hive: |
    connector.name=hive
    hive.metastore.uri=thrift://hive-metastore:9083
    hive.metastore.thrift.client.connect-timeout=30s
    hive.metastore.thrift.client.read-timeout=60s
    hive.metastore.thrift.client.max-retries=3
    hive.metastore-cache-ttl=2m
    hive.metastore-refresh-interval=1m
    hive.metastore.partition-batch-size.min=10
    hive.metastore.partition-batch-size.max=100
    fs.native-s3.enabled=true
    s3.endpoint=http://minio:9000
    s3.path-style-access=true
    s3.region=us-east-1
    s3.aws-access-key=minioadmin
    s3.aws-secret-key=changeme-minio-admin
    hive.non-managed-table-writes-enabled=true
    hive.recursive-directories=true
    hive.collect-column-statistics-on-write=false
  iceberg: |
    connector.name=iceberg
    iceberg.catalog.type=hive_metastore
    hive.metastore.uri=thrift://hive-metastore:9083
    hive.metastore.thrift.client.connect-timeout=30s
    hive.metastore.thrift.client.read-timeout=60s
    hive.metastore.thrift.client.max-retries=3
    fs.native-s3.enabled=true
    s3.endpoint=http://minio:9000
    s3.path-style-access=true
    s3.region=us-east-1
    s3.aws-access-key=minioadmin
    s3.aws-secret-key=changeme-minio-admin
    iceberg.file-format=PARQUET
    iceberg.target-max-file-size=512MB
    iceberg.minimum-assigned-split-weight=0.05
  postgresql: |
    connector.name=postgresql
    connection-url=jdbc:postgresql://analytics-postgres-rw:5432/analytics?sslmode=disable
    connection-user=trino_ro
    connection-password=changeme-analytics-pg
    case-insensitive-name-matching=true
    postgresql.experimental.enable-string-pushdown-with-collate=true

service:
  type: ClusterIP
  port: 8080

# Ingress — Case B: 외부 LB가 *.quantumcns.ai wildcard 인증서로 TLS termination 후
# HTTP로 qks-ingress-controller에 포워딩. 우리는 HTTP routing만 정의.
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: braveji.trino.quantumcns.ai
      paths:
        - path: /
          pathType: Prefix
  # tls 섹션 제거 — 업스트림 LB에서 이미 LE wildcard로 termination

serviceAccount:
  create: true
  name: trino

# Worker는 안정성보다 throughput 중요 → PDB 설정
# Coordinator는 1개로 시작, HA 필요 시 추후 검토
